{% extends 'base.html' %}
{% block content %}

<style>
    .card {
        width: min(100%, 480px);
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        border: 1px solid #eac55e;
        padding: clamp(20px, 4vw, 30px);
        text-align: center;
        box-shadow: 0 0 20px rgba(234, 197, 94, 0.3);
        margin: 30px auto;
    }

    h2 {
        color: #eac55e;
        font-size: clamp(24px, 5vw, 30px);
    }

    label {
        display: block;
        text-align: left;
        margin-top: 10px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: none;
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: #eac55e;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
    }

    .msg {
        color: lightgreen;
    }
</style>

<div class="card">

    <h2>Upload Photo</h2>

    {% if message %}
        <p class="msg">{{ message }}</p>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Caption</label>
        <input type="text" name="caption" required>

        <label>Select Image</label>
        <input type="file" name="image" required>

        <label>Place</label>
        <input type="text" name="place" required>

        <button type="submit">Upload</button>
    </form>

</div>

{% endblock %}
