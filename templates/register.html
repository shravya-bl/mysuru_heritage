{% extends 'base.html' %}
{% block content %}

<style>
    .card {
        width: min(100%, 430px);
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        border: 1px solid #eac55e;
        padding: clamp(20px, 4vw, 30px);
        text-align: center;
        box-shadow: 0 0 20px rgba(234, 197, 94, 0.3);
        animation: fadeIn 1.2s ease-out;
        margin: clamp(20px, 5vw, 60px) auto;
    }

    h2 {
        color: #eac55e;
        font-size: clamp(24px, 4.5vw, 28px);
        margin-bottom: 20px;
        font-weight: 600;
        letter-spacing: 1px;
        text-align: center;
    }

    label {
        color: white;
        font-size: 15px;
        display: block;
        text-align: left;
        margin: 8px 0 5px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: none;
        outline: none;
        font-size: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    input::placeholder {
        color: #cdd2e0;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #eac55e;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        color: #0b1a3c;
        margin-top: 10px;
        transition: 0.3s ease;
    }

    button:hover {
        background: #ffdd78;
        box-shadow: 0 0 12px rgba(234, 197, 94, 0.8);
    }

    p {
        margin-top: 18px;
        color: #d6d6d6;
        text-align: center;
    }

    a {
        color: #eac55e;
        font-weight: bold;
        text-decoration: none;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="card">

    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/">Login</a></p>
</div>

{% endblock %}
