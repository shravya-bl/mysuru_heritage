{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysuru Heritage</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0b1a3c, #102a55);
            font-family: "Poppins", sans-serif;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: #081833;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eac55e;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar .title {
            color: #eac55e;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 18px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #eac55e;
            text-shadow: 0 0 10px #eac55e;
        }
        
        /* PAGE CONTENT */
        .content {
            padding: 20px 30px;
            min-height: 75vh;
        }

        /* FOOTER */
        .footer {
            background: #081833;
            padding: 18px;
            text-align: center;
            border-top: 2px solid #eac55e;
            color: #eac55e;
            font-size: 15px;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="title">Mysuru Heritage</div>

        <div class="links">
            <a href="{% url 'landing' %}">Home</a>
            <a href="/places/">Places</a>
            <a href="/blog/">Blog</a>
            <a href="/gallery/">Gallery</a>

            {% if request.user.is_authenticated %}
                <a href="/home/">Dashboard</a>
                <p style="color:white;">Welcome, {{ user.username }}</p>
            {% else %}
                <a href="/">Login</a>
            {% endif %}
        </div>
    </div>

    <!-- MAIN PAGE CONTENT -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © Mysuru Heritage Project • Built by Shravya 💙
    </div>

</body>
</html>
