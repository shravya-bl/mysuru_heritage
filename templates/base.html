{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysuru Heritage</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0b1a3c, #102a55);
            font-family: "Poppins", sans-serif;
            color: white;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .navbar {
            background: #081833;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            border-bottom: 2px solid #eac55e;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }

        .navbar .title {
            color: #eac55e;
            font-size: clamp(21px, 3.2vw, 26px);
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .navbar .links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 10px 16px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #eac55e;
            text-shadow: 0 0 10px #eac55e;
        }

        .navbar .links p {
            margin: 0;
            font-size: 14px;
            color: #d9e2ff;
        }

        .content {
            padding: 20px 30px;
            min-height: 75vh;
        }

        .footer {
            background: #081833;
            padding: 18px;
            text-align: center;
            border-top: 2px solid #eac55e;
            color: #eac55e;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .navbar {
                padding: 14px 20px;
            }

            .content {
                padding: 18px;
            }
        }

        @media (max-width: 640px) {
            .navbar {
                justify-content: center;
                text-align: center;
            }

            .navbar .links {
                justify-content: center;
            }

            .navbar a {
                font-size: 15px;
            }

            .content {
                padding: 14px;
            }

            .footer {
                font-size: 13px;
                padding: 14px;
            }
        }
    </style>

</head>

<body>

    <div class="navbar">
        <div class="title">Mysuru Heritage</div>

        <div class="links">
            <a href="{% url 'landing' %}">Home</a>
            <a href="/places/">Places</a>
            <a href="/blog/">Blog</a>
            <a href="/gallery/">Gallery</a>

            {% if request.user.is_authenticated %}
                <a href="/home/">Dashboard</a>
                <p>Welcome, {{ user.username }}</p>
            {% else %}
                <a href="/">Login</a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <div class="footer">
        Copyright Mysuru Heritage Project | Built by Shravya
    </div>

</body>
</html>
