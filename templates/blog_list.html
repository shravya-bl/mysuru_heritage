{% extends 'base.html' %}
{% block content %}

<style>
    h1 {
        text-align: center;
        padding: 25px;
        font-size: 36px;
        color: #eac55e;
        margin-top: 80px; /* avoid navbar overlap */
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 20px 40px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        border-radius: 15px;
        border: 1px solid #eac55e;
        overflow: hidden;
        cursor: pointer;
        transition: 0.3s ease;
        backdrop-filter: blur(6px);
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(234,197,94,0.7);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .card-title {
        padding: 15px;
        color: #ffdd78;
        font-size: 20px;
        font-weight: bold;
    }

    .card-date {
        padding: 0 15px 15px;
        color: #c9c9c9;
        font-size: 14px;
    }

    .back {
        text-align: center;
        margin: 20px 0 40px;
    }

    .back a {
        color: #eac55e;
        font-weight: bold;
        text-decoration: none;
        font-size: 18px;
    }
</style>


<h1>Mysuru Heritage Blog</h1>

<div class="grid">
    {% for p in posts %}
    <div class="card" onclick="window.location.href='/blog/{{ p.id }}/'">

        {% if p.image %}
            <img src="{{ p.image.url }}" alt="Blog image">
        {% endif %}

        <div class="card-title">{{ p.title }}</div>
        <div class="card-date">{{ p.date }}</div>
    </div>
    {% endfor %}
</div>

<div class="back">
    <a href="/landing/">⬅ Back</a>
</div>

{% endblock %}
