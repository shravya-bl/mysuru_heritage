{% extends 'base.html' %}
{% block content %}

<style>
    h1 {
        margin-top: 35px;
        font-size: 34px;
        color: #eac55e;
        letter-spacing: 2px;
        text-align: center;
    }

    .form-box {
        margin-top: 30px;
        background: rgba(255,255,255,0.10);
        border: 1px solid #eac55e;
        padding: 25px;
        border-radius: 15px;
        display: inline-block;
        backdrop-filter: blur(6px);
    }

    input {
        width: 260px;
        padding: 12px;
        font-size: 15px;
        margin-bottom: 12px;
        border: none;
        border-radius: 10px;
        outline: none;
        background: rgba(255,255,255,0.2);
        color: white;
    }

    input::placeholder {
        color: #d6d6d6;
    }

    button {
        width: 260px;
        padding: 12px;
        background: #eac55e;
        color: #0b1a3c;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        background: #ffdd78;
        box-shadow: 0 0 10px rgba(234,197,94,0.8);
    }

    .map-button {
        margin-top: 25px;
        text-align: center;
    }

    .map-button a {
        background: #eac55e;
        padding: 12px 25px;
        border-radius: 12px;
        font-weight: bold;
        color: #0b1a3c;
        text-decoration: none;
        transition: 0.3s;
    }

    .map-button a:hover {
        background: #ffdd78;
        box-shadow: 0 0 12px rgba(234,197,94,0.8);
    }

    .back {
        margin-top: 30px;
        text-align: center;
    }

    .back a {
        color: #eac55e;
        font-size: 18px;
        text-decoration: none;
        font-weight: bold;
    }
</style>

<h1>Route to {{ place }}</h1>

<div style="text-align:center;">
    <div class="form-box">
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="source" placeholder="Enter Your Location" required>
            <button type="submit">Show Route</button>
        </form>
    </div>
</div>

{% if maps_url %}
<div class="map-button">
    <a href="{{ maps_url }}" target="_blank">Open Route in Google Maps</a>
</div>
{% endif %}

<div class="back">
    <a href="/places/options/?place={{ place }}">⬅ Back</a>
</div>

{% endblock %}
