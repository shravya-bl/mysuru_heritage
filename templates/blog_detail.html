{% extends 'base.html' %}
{% block content %}

<style>
    .container {
        width: min(100%, 960px);
        margin: 26px auto;
        background: rgba(255,255,255,0.08);
        border: 1px solid #eac55e;
        border-radius: 20px;
        padding: clamp(16px, 4vw, 25px);
        backdrop-filter: blur(6px);
        animation: fadeIn 1s ease;
    }

    img {
        width: 100%;
        border-radius: 12px;
        margin-bottom: 20px;
        max-height: 480px;
        object-fit: cover;
    }

    h1 {
        color: #eac55e;
        font-size: clamp(28px, 7vw, 34px);
        text-align: center;
        margin-bottom: 18px;
    }

    p {
        line-height: 1.7;
        font-size: clamp(16px, 4vw, 18px);
        color: #e6e6e6;
        margin-bottom: 20px;
        white-space: pre-wrap;
    }

    .back-btn {
        text-align: center;
        margin-top: 20px;
    }

    .back-btn a {
        color: #eac55e;
        font-weight: bold;
        font-size: 17px;
        text-decoration: none;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="container">
    <h1>{{ post.title }}</h1>

    {% if post.image %}
    <img src="{{ post.image }}" alt="Blog Image">
    {% endif %}

    <p>{{ post.content }}</p>

    <div class="back-btn">
        <a href="/blog/">Back to Blog</a>
    </div>
</div>

{% endblock %}
