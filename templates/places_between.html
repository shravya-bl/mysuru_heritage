<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Places Between | {{ place }}</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 16px;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #0b1a3c, #12306b, #0d1f47);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 16px;
            font-size: clamp(28px, 6.6vw, 34px);
            color: #eac55e;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            padding: 20px 0;
        }

        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            border: 1px solid #eac55e;
            backdrop-filter: blur(6px);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(234,197,94,0.8);
        }

        .card img {
            width: 100%;
            height: clamp(140px, 32vw, 170px);
            border-radius: 12px;
            object-fit: cover;
        }

        .card h3 {
            margin-top: 12px;
            color: #ffdd78;
        }

        .card p {
            font-size: 14px;
            color: #dcdcdc;
            padding: 0 8px;
        }

        .back {
            margin-bottom: 18px;
        }

        .back a {
            color: #eac55e;
            text-decoration: none;
            font-size: 17px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Places Between | {{ place }}</h1>

    <div class="grid">
        {% for p in places_list %}
        <div class="card">
            <img src="{{ p.image }}" alt="">
            <h3>{{ p.name }}</h3>
            <p>{{ p.desc }}</p>
        </div>
        {% empty %}
        <p style="color:#ffdd78; font-size:18px;">No specific stops found on the way.</p>
        {% endfor %}
    </div>

    <div class="back">
        <a href="/places/options/?place={{ place }}">Back</a>
    </div>

</body>
</html>
