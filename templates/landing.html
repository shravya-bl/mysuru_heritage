{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
    .landing-container {
        height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: url("{% static 'images/bg.jpg' %}") no-repeat center center/cover;
        border-radius: 0;
    }

    .overlay {
        background: rgba(11, 26, 60, 0.75);
        padding: 60px;
        border-radius: 20px;
        border: 1px solid #eac55e;
        box-shadow: 0 0 25px rgba(234,197,94,0.4);
    }

    h1 {
        font-size: 52px;
        color: #eac55e;
        margin-bottom: 10px;
        text-shadow: 0 0 18px rgba(234,197,94,0.8);
    }

    p {
        font-size: 20px;
        color: white;
        margin-bottom: 30px;
    }

    .btn-box {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn {
        background: #eac55e;
        color: #0b1a3c;
        padding: 12px 26px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        transition: 0.3s ease;
    }

    .btn:hover {
        background: #ffdd78;
        box-shadow: 0 0 15px rgba(234,197,94,0.9);
    }
</style>

<div class="landing-container">
    <div class="overlay">
        <h1>Mysuru Heritage</h1>
        <p>Experience the Royal Beauty, Culture, and Legacy of Mysuru</p>

        <div class="btn-box">
            <a href="/" class="btn">Login</a>
            <a href="/places/" class="btn">Explore Places</a>
            <a href="/blog/" class="btn">Blog</a>
            <a href="/gallery/" class="btn">Gallery</a>
        </div>
    </div>
</div>

{% endblock %}
