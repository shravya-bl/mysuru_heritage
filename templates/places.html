{% extends 'base.html' %}
{% load static %}
{% block content %}


<style>
    h1 {
        text-align: center;
        padding: 25px 0;
        font-size: 36px;
        color: #eac55e;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 20px 40px;
    }

    .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(6px);
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid #eac55e;
        transition: 0.3s ease;
        cursor: pointer;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(234, 197, 94, 0.6);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .card-title {
        padding: 15px;
        text-align: center;
        font-size: 20px;
        color: #ffdd78;
    }

    .back {
        margin-top: 10px;
        text-align: center;
    }

    .back a {
        color: #eac55e;
        font-size: 18px;
        text-decoration: none;
        font-weight: bold;
    }
</style>

<h1>Mysuru Heritage Places</h1>

<div class="grid">
    {% for p in places %}
    <div class="card" onclick="window.location.href='/places/options/?place={{ p.name }}'">
        <img src="{% static p.image %}" alt="Place Image">
        <div class="card-title">{{ p.name }}</div>
        <p style="text-align:center;color:#eac55e;font-size:14px;">{{ p.category|title }}</p>
    </div>
    {% endfor %}
</div>

<div class="back">
    <a href="{% url 'landing' %}">⬅ Back to Home</a>
</div>

{% endblock %}
