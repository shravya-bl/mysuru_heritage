{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>
    h1{
        color:#eac55e;
        text-align:center;
        margin-bottom:24px;
        font-size: clamp(28px, 6.5vw, 36px);
    }

    .grid{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap:18px;
    }

    .card{
        background:#1a2b5a;
        border:1px solid #eac55e;
        border-radius:15px;
        padding:12px;
        text-align:center;
        box-shadow:0 0 10px rgba(234,197,94,0.5);
    }

    .card img{
        width:100%;
        height: clamp(150px, 34vw, 200px);
        object-fit:cover;
        border-radius:10px;
    }

    h3{
        color:#ffd86b;
        margin-top:10px;
    }

    p{
        color:#ddd;
    }
</style>

<h1>Places Between Your Journey</h1>

<div class="grid">
{% for p in between_places %}
    <div class="card">
        <img src="{% static p.image %}">
        <h3>{{ p.name }}</h3>
        <p>{{ p.desc }}</p>
    </div>
{% endfor %}
</div>

{% endblock %}
