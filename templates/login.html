{% extends 'base.html' %}
{% block content %}

<style>
    .card {
        width: 380px;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        border: 1px solid #eac55e;
        padding: 30px;
        text-align: center;
        box-shadow: 0 0 20px rgba(234, 197, 94, 0.3);
        animation: fadeIn 1.2s ease-out;
        margin: 60px auto;
    }

    h2 {
        color: #eac55e;
        font-size: 28px;
        margin-bottom: 25px;
        font-weight: 600;
    }

    label {
        color: white;
        font-size: 15px;
        display: block;
        text-align: left;
        margin: 8px 0 5px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: none;
        outline: none;
        font-size: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #eac55e;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        color: #0b1a3c;
        margin-top: 10px;
    }

    button:hover {
        background: #ffdd78;
    }

    .error-box {
        background: rgba(255, 0, 0, 0.15);
        color: #ff6b6b;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-weight: bold;
    }

    p {
        margin-top: 18px;
        color: #d6d6d6;
    }

    a {
        color: #eac55e;
        font-weight: bold;
        text-decoration: none;
    }
</style>

<div class="card">

    <h2>Login</h2>

    <!-- ✅ SHOW ERROR MESSAGE -->
    {% if messages %}
        {% for message in messages %}
            <div class="error-box">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    <p>New user? <a href="/register/">Create Account</a></p>
</div>

{% endblock %}
